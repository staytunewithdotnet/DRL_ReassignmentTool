<div class="common-popup">
  <div class="modal-header">
    <h2 class="page-title">Warning</h2>
  </div>
  <div class="nav-white-box">
    <div class="container-fluid">
      <div>{{warningText}}</div>
    </div>
    <div>
      <mat-dialog-actions align="end">
        <button mat-button [mat-dialog-close]="true" cdkFocusInitial class="btn btn-blue pull-right"
          style="height: 36px;width: 130px;margin-right: 15px;">OK</button>
      </mat-dialog-actions>
    </div>
  </div>
</div>
